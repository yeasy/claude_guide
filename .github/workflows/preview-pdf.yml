name: Update Preview PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  MDPRESS_VERSION: 0.7.10
  MDPRESS_SHA256: 17e53e455996940bbbce64c69c43b3fb543f1501e03b74cf0434074efebd2db4

concurrency:
  group: preview-pdf
  cancel-in-progress: true

jobs:
  update-preview-pdf:
    name: Update preview release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@2e1d749697dd1612b833dba4a722266286fbefcd # v2.1.2
        with:
          chrome-version: stable
      - name: Install CJK fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra

      - name: Install mdpress v${{ env.MDPRESS_VERSION }}
        run: |
          curl -fsSL "https://github.com/yeasy/mdPress/releases/download/v${MDPRESS_VERSION}/mdpress_${MDPRESS_VERSION}_linux_amd64.tar.gz" -o /tmp/mdpress.tar.gz
          echo "${MDPRESS_SHA256}  /tmp/mdpress.tar.gz" | sha256sum -c -
          tar xzf /tmp/mdpress.tar.gz -C /tmp mdpress
          sudo mv /tmp/mdpress /usr/local/bin/
          mdpress --version

      - name: Build latest preview PDF
        run: |
          mkdir -p dist
          mdpress build --format pdf --output dist/claude_guide.pdf

      - name: Write release notes
        run: |
          cat > dist/release-notes.md <<EOF
          Auto-updated preview PDF from \`${GITHUB_SHA::7}\`.

          - Branch: \`${GITHUB_REF_NAME}\`
          - Commit: https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}
          - Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF

      - name: Create preview release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view preview-pdf >/dev/null 2>&1 || \
            gh release create preview-pdf \
              --title "Latest Preview PDF" \
              --notes-file dist/release-notes.md \
              --prerelease \
              --latest=false \
              --target "$GITHUB_SHA"

      - name: Update preview release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit preview-pdf \
            --title "Latest Preview PDF" \
            --notes-file dist/release-notes.md \
            --prerelease \
            --target "$GITHUB_SHA"

      - name: Remove legacy preview asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete-asset preview-pdf latest.pdf -y || true

      - name: Upload preview PDF
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload preview-pdf dist/claude_guide.pdf --clobber
